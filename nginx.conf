server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Configuración específica para archivos estáticos de Next.js
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Configuración específica para CSS y JS
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    # Configuración específica para imágenes y otros assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    # Redirect root to English by default
    location = / {
        return 302 $scheme://$http_host/en/;
    }

    # Intenta servir el archivo directamente. Si falla, intenta servir sin la extensión .html.
    # CRÍTICO para Next.js export: permite que las rutas funcionen sin el .html final.
    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    # En caso de que se necesite manejo de errores
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}